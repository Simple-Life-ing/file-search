name: Publish to crates.io

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml
        run: |
          echo "Verifying Cargo.toml..."
          cargo metadata --format-version 1 > /dev/null
          echo "✓ Cargo.toml is valid"

      - name: Check package version matches tag
        run: |
          TAG=${{ github.event.release.tag_name }}
          PACKAGE_VERSION=$(grep '^version' Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          
          if [ "$TAG" != "v$PACKAGE_VERSION" ]; then
            echo "❌ Tag version mismatch!"
            echo "Tag: $TAG"
            echo "Package: v$PACKAGE_VERSION"
            exit 1
          fi
          
          echo "✓ Version matches: v$PACKAGE_VERSION"

      - name: Run tests again
        run: cargo test --lib

      - name: Check documentation builds
        run: cargo doc --no-deps

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io
        run: sleep 15

      - name: Verify publication
        run: |
          PACKAGE_VERSION=$(grep '^version' Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "Checking if file-search@$PACKAGE_VERSION is available on crates.io..."
          cargo search file-search --limit 1
        continue-on-error: true

      - name: Comment on release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.payload.release.tag_name;
            const releaseId = context.payload.release.id;
            
            const comment = `## 📦 Package Published
            
            Successfully published to [crates.io](https://crates.io/crates/file-search).

            ### Installation
            \`\`\`bash
            cargo install file-search
            \`\`\`

            ### Links
            - [Package on crates.io](https://crates.io/crates/file-search)
            - [Documentation on docs.rs](https://docs.rs/file-search)
            - [GitHub Release](https://github.com/file-search/file-search/releases/tag/${tag})
            `;
            
            github.rest.repos.createReleaseComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: comment
            });
