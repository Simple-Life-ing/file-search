name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${{ github.ref_name }}
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline "$TAG" || echo "Initial release")
          else
            CHANGELOG=$(git log --oneline "$PREV_TAG..$TAG" || echo "No changes found")
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}

            ### Changelog
            ${{ steps.changelog.outputs.changelog }}

            ### Build Information
            - **Rust Version**: 1.70+
            - **Build Time**: ${{ env.BUILD_TIME }}
            
            ### Test Coverage
            This release has been thoroughly tested:
            - ✅ All unit tests passing
            - ✅ All integration tests passing
            - ✅ Code quality checks passed
            - ✅ Cross-platform validation (Linux, macOS, Windows)

            ### Installation
            Install from crates.io:
            ```bash
            cargo install file-search
            ```

            Or compile from source:
            ```bash
            git clone https://github.com/file-search/file-search.git
            cd file-search
            git checkout ${{ github.ref_name }}
            cargo build --release
            ```

            ### Documentation
            - [User Guide](https://github.com/file-search/file-search/blob/main/README.md)
            - [API Documentation](https://docs.rs/file-search)
            - [Performance Guide](https://github.com/file-search/file-search/blob/main/PERFORMANCE.md)
            - [Benchmark Results](./BENCHMARKS.md)
          draft: false
          prerelease: false

      - name: Set build time
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

  test-before-release:
    name: Verify Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run all tests
        run: cargo test --release --all --verbose

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary
        run: cargo run --release -- --help
        shell: bash

  build-artifacts:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: file-search
            asset_name: file-search-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: file-search
            asset_name: file-search-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: file-search.exe
            asset_name: file-search-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream

  publish-documentation:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: create-release
    if: success()
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build documentation site
        run: |
          cargo doc --no-deps
          mkdir -p target/doc_site
          cp -r target/doc/* target/doc_site/
          echo '<meta http-equiv="refresh" content="0; url=file_search/index.html" />' > target/doc_site/index.html

      - name: Upload to GitHub Pages
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: target/doc_site/
